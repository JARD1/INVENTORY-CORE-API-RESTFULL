# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (MYSQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_core_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Usuario por defecto
spring.datasource.username=root

# Usamos una variable de entorno para ocultar la clave en GitHub
spring.datasource.password=tu-contraseńa

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=8081
server.ssl.enabled=false

# ===============================
# CONFIGURACIÓN DE SEGURIDAD (JWT)
# ===============================
# Una clave secreta larga en Base64 para firmar los tokens
jwt.secret.key=586E3272357538782F413F4428472B4B6250655368566D597133743677397A24
# Tiempo de expiración del token (24 horas en milisegundos)
jwt.expiration=86400000